<div
        style="
        display: grid;
        grid-template-columns: 2fr 1fr;
        width: 20%;
        aspect-ratio: 1 / 1;
        font-family: Arial, sans-serif;
        container-type: inline-size;
        overflow: hidden;
    "
>

    <!-- LEFT: IMAGE -->
    <div style="height: 100%; overflow: hidden;">
        <img
                src="images/image3.png"
                alt="Dense clusters of small white and purple flowers growing in a garden bed."
                style="
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            "
        />
    </div>

    <!-- RIGHT: INFO PANEL -->
    <div
            style="
            /*background: #333333;*/
            background: #0b7f2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6cqw;
            padding: 6cqw;
            text-align: left;
            box-sizing: border-box;
            height: 100%;
        "
    >

        <!-- ITEM 1 -->
        <div>
            <div style="font-size: 4cqw; line-height: 1.2;">
                Seed weight:
            </div>
            <div style="font-size: 6cqw; font-weight: bold;">
                0.05g
            </div>
        </div>

        <!-- ITEM 2 -->
        <div>
            <div style="font-size: 4cqw; line-height: 1.2;">
                Planting:
            </div>
            <div style="font-size: 5cqw; font-weight: bold;">
                From March to April
            </div>
        </div>

        <!-- ITEM 3 -->
        <div>
            <div style="font-size: 4cqw; line-height: 1.2;">
                Flowering:
            </div>
            <div style="font-size: 5cqw; font-weight: bold;">
                From June to October
            </div>
        </div>

    </div>

</div>
